<style>
  /* ============ MODULE 1 SPECIFIC STYLES ============ */
  .scheduler-grid {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  @media (max-width: 1100px) { .scheduler-grid { grid-template-columns: 1fr; } }

  .sched-panel-block {
    background: var(--surface, #1e1e24);
    border: 1px solid var(--border, #333);
    border-radius: var(--radius, 8px);
    padding: 20px;
  }

  .block-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    font-family: var(--font-mono), monospace;
    font-size: 13px;
    color: var(--running, #2ecc71);
    border-bottom: 1px solid var(--border, #333);
    padding-bottom: 8px;
  }

  .ctrl-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  
  select, input[type="number"], button {
    background: var(--surface-2, #252529);
    color: var(--text, #eee);
    border: 1px solid var(--border-bright, #444);
    padding: 8px 14px;
    border-radius: var(--radius, 8px);
    font-family: var(--font-mono), monospace;
    font-size: 12px;
    outline: none;
  }
  
  input[type="number"] {
    background: var(--bg, #121214);
    border: 1px solid var(--border-bright, #444);
    text-align: center;
  }
  
  button {
    cursor: pointer;
    background: var(--border-bright, #444);
    font-weight: 500;
    transition: all 0.15s ease;
  }
  button:hover { background: var(--text-dimmer, #666); }
  .btn-run { background: #2ecc71; color: #fff; font-weight: 600; border: none; }
  .btn-run:hover { background: #27ae60; }
  .btn-run:disabled { background: #444; color: #888; cursor: not-allowed; }

  .sched-table {
    width: 100%;
    border-collapse: separate; 
    border-spacing: 0;
    font-family: var(--font-mono), monospace;
    font-size: 12px;
    text-align: left;
    margin-top: 12px;
  }

  .sched-table th, .sched-table td {
    padding: 12px 16px; 
    border-bottom: 1px solid var(--border, #333);
    white-space: nowrap; 
  }

  .sched-table th { 
    color: var(--text-dim, #aaa); 
    font-weight: 600; 
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.8px;
  }
  .sched-table input[type="number"] { width: 70px; padding: 5px; }

  .state-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin: 24px 0;
  }
  .state-node {
    background: var(--surface-2, #252529);
    border: 1px solid var(--border, #333);
    border-radius: var(--radius, 8px);
    padding: 12px 8px;
    text-align: center;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    overflow-y: auto;
  }
  .state-node .node-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim, #aaa);
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  
  .pcb-token {
    background: #3498db;
    color: #fff;
    font-family: var(--font-mono), monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 4px;
    width: 90%;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    animation: tokenSpawn 0.25s ease forwards;
    transition: all 0.2s ease;
  }
  @keyframes tokenSpawn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

  .gantt-wrapper {
    background: var(--surface, #1e1e24);
    border: 1px solid var(--border, #333);
    border-radius: var(--radius, 8px);
    padding: 18px;
    margin-bottom: 20px;
  }
  .gantt-timeline {
    display: flex;
    background: var(--bg, #121214);
    border: 1px solid var(--border-bright, #444);
    border-radius: 4px;
    height: 44px;
    overflow-x: auto;
    margin-top: 12px;
    align-items: center;
    padding: 0 4px;
  }
  .gantt-unit {
    background: #e67e22;
    color: #fff;
    font-family: var(--font-mono), monospace;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 2px solid #121214;
    position: relative;
    min-width: 45px;
    height: 32px;
    flex-grow: 0;
    flex-shrink: 0;
    border-radius: 3px;
  }
  .gantt-unit.idle-unit { background: #7f8c8d; color: #fff; }
  .gantt-unit.cs-unit { background: #e74c3c; opacity: 0.9; }
  .gantt-unit .ts-mark {
    position: absolute;
    bottom: -16px;
    right: -2px;
    font-size: 9px;
    color: var(--text-dim, #aaa);
    font-weight: 400;
  }
</style>

<div class="scheduler-grid">
  <div class="sched-panel-block">
    <div class="block-header">
      <div>Core Task Matrix</div>
      <div class="ctrl-group">
        <button id="btn-add-proc" onclick="addSchedulerRow()">+ Add Process</button>
      </div>
    </div>
    <table class="sched-table" id="input-matrix">
      <thead>
        <tr>
          <th>PID</th>
          <th>Arrival Time</th>
          <th>Burst Time</th>
          <th>Priority</th>
        </tr>
      </thead>
      <tbody id="sched-input-body">
        <tr>
          <td>P1</td>
          <td><input type="number" class="p-arrival" value="0" min="0"></td>
          <td><input type="number" class="p-burst" value="5" min="1"></td>
          <td><input type="number" class="p-priority" value="2" min="1"></td>
        </tr>
        <tr>
          <td>P2</td>
          <td><input type="number" class="p-arrival" value="1" min="0"></td>
          <td><input type="number" class="p-burst" value="3" min="1"></td>
          <td><input type="number" class="p-priority" value="1" min="1"></td>
        </tr>
        <tr>
          <td>P3</td>
          <td><input type="number" class="p-arrival" value="2" min="0"></td>
          <td><input type="number" class="p-burst" value="4" min="1"></td>
          <td><input type="number" class="p-priority" value="3" min="1"></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="sched-panel-block">
    <div class="block-header">Execution Engine Profile</div>
    <div class="ctrl-group" style="flex-direction: column; align-items: flex-start; gap: 15px;">
      <div style="width: 100%;">
        <label style="display: block; font-size: 12px; color: #aaa; margin-bottom: 6px;">Algorithm:</label>
        <select id="sched-algo" onchange="checkAlgoQuantum()" style="width: 100%;">
          <option value="FCFS">First-Come, First-Served (FCFS)</option>
          <option value="SJF">Shortest Job First (SJF - NonPreemptive)</option>
          <option value="Priority">Priority Scheduling (NonPreemptive)</option>
          <option value="RR">Round Robin (RR)</option>
        </select>
      </div>
      
      <div id="quantum-wrapper" style="display: none; width: 100%;">
        <label style="display: block; font-size: 12px; color: #aaa; margin-bottom: 6px;">Time Quantum:</label>
        <input type="number" id="sched-quantum" value="2" min="1" style="width: 80px;">
      </div>

      <button class="btn-run" id="btn-core-sim" onclick="initSchedulerSimulation()" style="width: 100%; padding: 10px;">Initialize Core Simulation</button>
    </div>
  </div>
</div>

<div class="state-row">
  <div class="state-node" id="box-NEW"><div class="node-title">NEW</div></div>
  <div class="state-node" id="box-READY"><div class="node-title">READY</div></div>
  <div class="state-node" id="box-RUNNING"><div class="node-title">RUNNING</div></div>
  <div class="state-node" id="box-WAIT"><div class="node-title">WAITING</div></div>
  <div class="state-node" id="box-TERM"><div class="node-title">TERMINATED</div></div>
</div>

<div class="gantt-wrapper">
  <div style="font-family: var(--font-mono), monospace; font-size: 12px; color: #aaa;">// Live Execution Gantt Timeline</div>
  <div class="gantt-timeline" id="live-gantt-bar"></div>
</div>

<div class="sched-panel-block" id="result-block" style="display: none;">
  <div class="block-header">Analytical Performance Metrics</div>
  <table class="sched-table">
    <thead>
      <tr>
        <th>PID</th>
        <th>Arrival Time</th>
        <th>Burst Time</th>
        <th>Completion Time (CT)</th>
        <th>Turnaround Time (TAT)</th>
        <th>Waiting Time (WT)</th>
      </tr>
    </thead>
    <tbody id="sched-result-body"></tbody>
  </table>
  <div id="sched-averages" style="font-family: var(--font-mono), monospace; font-size: 12px; margin-top: 14px; color: #2ecc71;"></div>
</div>

<script>
  window.pIdCounter = window.pIdCounter || 4;

  // গ্লোবাল স্টেট মেশিন অবজেক্ট
  let ssSchedState = {
    running: false,
    algo: 'FCFS',
    quantum: 2,
    time: 0,
    list: [],
    queue: [], 
    completedList: [],
    index: 0,
    lastRunningPID: null,
    contextSwitchOverheadTime: 1,
    currentActiveProcess: null,
    stepStage: 'INIT' // INIT -> READY_CHECK -> EXECUTE -> END
  };

  function checkAlgoQuantum() {
    const algo = document.getElementById('sched-algo').value;
    document.getElementById('quantum-wrapper').style.display = (algo === 'RR') ? 'block' : 'none';
  }

  function addSchedulerRow() {
    const tbody = document.getElementById('sched-input-body');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>P${window.pIdCounter}</td>
      <td><input type="number" class="p-arrival" value="${window.pIdCounter-1}" min="0"></td>
      <td><input type="number" class="p-burst" value="${Math.floor(Math.random()*5)+2}" min="1"></td>
      <td><input type="number" class="p-priority" value="${Math.floor(Math.random()*4)+1}" min="1"></td>
    `;
    tbody.appendChild(tr);
    window.pIdCounter++;
  }

  function clearOldPCBTokens() {
    document.querySelectorAll('.pcb-token').forEach(el => el.remove());
    document.getElementById('live-gantt-bar').innerHTML = '';
    document.getElementById('result-block').style.display = 'none';
  }

  function initSchedulerSimulation() {
    // যদি রানিং থাকে, তবে এই বাটন ডেসপ্যাচার স্টেপ হিসেবে কাজ করবে
    if (ssSchedState.running) {
      executeNextSchedulerStep();
      return;
    }

    clearOldPCBTokens();
    
    const rows = document.getElementById('sched-input-body').rows;
    let incomingProcesses = [];
    
    for(let i=0; i<rows.length; i++) {
        let pid = rows[i].cells[0].innerText;
        let arrival = parseInt(rows[i].querySelector('.p-arrival').value) || 0;
        let burst = parseInt(rows[i].querySelector('.p-burst').value) || 1;
        let priority = parseInt(rows[i].querySelector('.p-priority').value) || 1;
        
        let randomAddresses = ["0x1A2F", "0x01BB", "0x05CC", "0x02F0", "0x09AA"];
        let assignedAddr = randomAddresses[i % randomAddresses.length];

        incomingProcesses.push({
            pid: pid, arr: arrival, burst: burst, rem: burst, prio: priority,
            ct: 0, tat: 0, wt: 0, memKB: burst * 12, logicalAddr: assignedAddr,
            inReadyQueue: false
        });
        
        injectPCBToken('NEW', pid);
    }
    
    // কার্নেল ফ্রেশ স্টেট সেটআপ
    ssSchedState.running = true;
    ssSchedState.algo = document.getElementById('sched-algo').value;
    ssSchedState.quantum = parseInt(document.getElementById('sched-quantum').value) || 2;
    ssSchedState.time = 0;
    ssSchedState.completedList = [];
    ssSchedState.index = 0;
    ssSchedState.lastRunningPID = null;
    ssSchedState.currentActiveProcess = null;
    ssSchedState.queue = [];
    ssSchedState.stepStage = 'READY_CHECK';

    // FCFS এর ক্ষেত্রে অ্যারাইভাল সর্টিং
    if (ssSchedState.algo === 'FCFS') {
      incomingProcesses.sort((a,b) => a.arr - b.arr);
    }
    ssSchedState.list = incomingProcesses;

    // UI মোড পরিবর্তন
    document.getElementById('btn-core-sim').innerText = "⏱️ Dispatch Next Step";
    document.getElementById('btn-core-sim').className = "btn-run";
    document.getElementById('btn-add-proc').disabled = true;

    if(window.KernelXLog) window.KernelXLog(`Kernel Signal: Click 'Dispatch' to load Ready Queue.`, 'warn');
    
    // প্রথম ক্লিকের কাজ: কিউ লোড করা
    executeNextSchedulerStep();
  }

  function executeNextSchedulerStep() {
    let { algo, list, completedList, time, queue } = ssSchedState;
    
    if (completedList.length === list.length) {
      terminateSimulationEngine();
      return;
    }

    // ১. রেডি কিউ আপডেট স্টেজ (টাইম অনুযায়ী প্রসেস NEW থেকে READY-তে মুভ করবে)
    if (ssSchedState.stepStage === 'READY_CHECK') {
      let addedAny = false;
      
      list.forEach(p => {
        if (p.arr <= time && p.rem > 0 && !p.inReadyQueue) {
          p.inReadyQueue = true;
          queue.push(p);
          relocatePCBToken(p.pid, 'READY');
          addedAny = true;
        }
      });

      // যদি কোন প্রসেস রেডি না থাকে কিন্তু ব্যাকলগ বাকি থাকে, তবে টাইম স্কিপ করবে (CPU IDLE)
      if (queue.length === 0 && completedList.length < list.length) {
        let uncompleted = list.filter(p => p.rem > 0);
        let nextArrival = Math.min(...uncompleted.map(p => p.arr));
        let idleTime = nextArrival - time;
        renderGanttSlice("IDLE", idleTime, nextArrival, true);
        ssSchedState.time = nextArrival;
        if(window.KernelXLog) window.KernelXLog(`CPU IDLE: Forwarded time to ${nextArrival}`, 'warn');
        return; // এই ক্লিকে আইডিয়াল স্লাইস তৈরি হলো, পরের ক্লিকে রেডি হবে
      }

      // অ্যালগরিদম ওয়াইজ কিউ সর্টিং
      if (algo === 'SJF') {
        queue.sort((a,b) => a.burst - b.burst);
      } else if (algo === 'Priority') {
        queue.sort((a,b) => a.prio - b.prio);
      }

      ssSchedState.stepStage = 'EXECUTE';
      if(window.KernelXLog) window.KernelXLog(`Queue sync complete. Ready for Execution Pipeline.`);
      // ২য় ধাপে সরাসরি মুভ করার জন্য রিকার্সন দেওয়া হলো না, যাতে ইউজারকে আরেকটি ক্লিক করতে হয়।
      if (addedAny) return; 
    }

    // ২. এক্সিকিউশন স্টেজ (READY থেকে RUNNING-এ ট্রান্সফার)
    if (ssSchedState.stepStage === 'EXECUTE') {
      if (queue.length === 0) {
        ssSchedState.stepStage = 'READY_CHECK';
        executeNextSchedulerStep();
        return;
      }

      let p = (algo === 'RR') ? queue.shift() : queue[0];
      ssSchedState.currentActiveProcess = p;

      // কনটেক্সট সুইচিং হ্যান্ডলিং
      if (ssSchedState.lastRunningPID !== null && ssSchedState.lastRunningPID !== p.pid) {
        renderGanttSlice("CS", ssSchedState.contextSwitchOverheadTime, time + ssSchedState.contextSwitchOverheadTime, false, true);
        ssSchedState.time += ssSchedState.contextSwitchOverheadTime;
        ssSchedState.lastRunningPID = p.pid;
        if(window.KernelXLog) window.KernelXLog(`[CONTEXT SWITCH]: Allocating vector space for ${p.pid}`, 'warn');
        return; // সিএস স্লাইস অ্যাড হলো, পরের ক্লিকে রান বক্সে যাবে
      }
      ssSchedState.lastRunningPID = p.pid;

      // রান বক্সে টোকেন মুভ করা
      relocatePCBToken(p.pid, 'RUNNING');
      invokeVirtualMemoryTranslation(p);

      // ক্যালকুলেশন ডিউরেশন স্লাইস নির্ধারণ
      if (algo === 'RR') {
        let slice = Math.min(p.rem, ssSchedState.quantum);
        p.rem -= slice;
        ssSchedState.time += slice;
        renderGanttSlice(p.pid, slice, ssSchedState.time);

        // নতুন আসা প্রসেসগুলো চেক করা কারেন্ট টাইমের ভেতর
        list.forEach(proc => {
          if (proc.arr <= ssSchedState.time && proc.rem > 0 && !proc.inReadyQueue) {
            proc.inReadyQueue = true;
            queue.push(proc);
            relocatePCBToken(proc.pid, 'READY');
          }
        });

        if (p.rem > 0) {
          queue.push(p); // আবার কিউ এর পিছনে চলে গেল
          ssSchedState.stepStage = 'READY_CHECK';
          setTimeout(() => relocatePCBToken(p.pid, 'READY'), 200);
        } else {
          p.ct = ssSchedState.time;
          p.tat = p.ct - p.arr;
          p.wt = p.tat - p.burst;
          completedList.push(p);
          setTimeout(() => relocatePCBToken(p.pid, 'TERM'), 200);
          ssSchedState.stepStage = 'READY_CHECK';
        }
      } else {
        // FCFS, SJF, Priority (Non-preemptive) এর জন্য ফুল বার্স্ট এক্সিকিউশন
        queue.shift(); // কিউ থেকে রিমুভ
        ssSchedState.time += p.burst;
        p.ct = ssSchedState.time;
        p.tat = p.ct - p.arr;
        p.wt = p.tat - p.burst;
        p.rem = 0;
        
        renderGanttSlice(p.pid, p.burst, p.ct);
        setTimeout(() => relocatePCBToken(p.pid, 'TERM'), 200);
        completedList.push(p);
        ssSchedState.stepStage = 'READY_CHECK';
      }
    }

    if (completedList.length === list.length) {
      setTimeout(terminateSimulationEngine, 300);
    }
  }

  function terminateSimulationEngine() {
    ssSchedState.running = false;
    document.getElementById('btn-core-sim').innerText = "Initialize Core Simulation";
    document.getElementById('btn-add-proc').disabled = false;
    displayPerformanceMatrix(ssSchedState.list);
    if(window.KernelXLog) window.KernelXLog("Execution Engine: Done. Matrix rendered.", "ok");
  }

  function injectPCBToken(state, pid) {
    const box = document.getElementById(`box-${state}`);
    if(!box) return;
    const token = document.createElement('div');
    token.className = 'pcb-token';
    token.id = `token-${pid}`;
    token.innerText = pid;
    box.appendChild(token);
  }

  function relocatePCBToken(pid, targetState) {
    const token = document.getElementById(`token-${pid}`);
    const targetBox = document.getElementById(`box-${targetState}`);
    if(token && targetBox) {
        targetBox.appendChild(token);
        if(targetState === 'RUNNING') token.style.background = '#2ecc71'; // Green
        if(targetState === 'READY') token.style.background = '#f1c40f';   // Yellow
        if(targetState === 'WAITING') token.style.background = '#e74c3c'; // Red
        if(targetState === 'TERM') token.style.background = '#95a5a6';    // Grey
    }
  }

  function renderGanttSlice(pid, duration, endTime, isIdle = false, isCS = false) {
    const bar = document.getElementById('live-gantt-bar');
    const unit = document.createElement('div');
    
    let extraClass = '';
    if (isIdle) extraClass = ' idle-unit';
    if (isCS) extraClass = ' cs-unit';
    
    unit.className = 'gantt-unit' + extraClass;
    unit.style.width = `${duration * 30}px`;
    unit.style.minWidth = `40px`;
    unit.innerHTML = `${pid}<span class="ts-mark">${endTime}</span>`;
    bar.appendChild(unit);
  }

  function invokeVirtualMemoryTranslation(p) {
    if (typeof window.triggerAddressTranslation === 'function' || document.getElementById('logical-input')) {
        const inputField = document.getElementById('logical-input');
        if (inputField) inputField.value = p.logicalAddr;
        if (typeof triggerAddressTranslation === 'function') triggerAddressTranslation();
    }
  }

  function displayPerformanceMatrix(processedList) {
    const tbody = document.getElementById('sched-result-body');
    tbody.innerHTML = '';
    let totalTat = 0, totalWt = 0;
    
    processedList.forEach(p => {
        totalTat += p.tat;
        totalWt += p.wt;
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${p.pid}</td><td>${p.arr}</td><td>${p.burst}</td><td>${p.ct}</td><td>${p.tat}</td><td>${p.wt}</td>`;
        tbody.appendChild(tr);
    });
    
    const avgTat = (totalTat / processedList.length).toFixed(2);
    const avgWt = (totalWt / processedList.length).toFixed(2);
    
    document.getElementById('sched-averages').innerHTML = `Average Turnaround Time: <strong>${avgTat}ms</strong> | Average Waiting Time: <strong>${avgWt}ms</strong>`;
    document.getElementById('result-block').style.display = 'block';
  }
</script>
