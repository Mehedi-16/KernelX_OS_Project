<style>
  .allocator-grid {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  @media (max-width: 1100px) { .allocator-grid { grid-template-columns: 1fr; } }

  .alloc-panel-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  /* --- লাইভ বার চার্ট স্টাইল --- */
  .comparison-chart-wrapper {
    margin-top: 15px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
  }
  .chart-title {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .chart-bars {
    display: flex;
    justify-content: space-around;
    align-items: flex-end;
    height: 80px;
    padding-top: 10px;
  }
  .chart-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 25%;
  }
  .bar-container {
    width: 24px;
    height: 50px;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    border-radius: 3px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
  }
  .bar-fill-used {
    background: var(--ready);
    width: 100%;
    transition: height 0.4s ease;
  }
  .bar-fill-frag {
    background: var(--fault);
    width: 100%;
    transition: height 0.4s ease;
  }
  .bar-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 6px;
  }
  .best-pick-star {
    position: absolute;
    top: -12px;
    font-size: 9px;
    color: #ffb454;
  }

  /* --- হার্ডওয়্যার মেমোরি ম্যাপের কাস্টম স্প্লিট স্টাইল --- */
  .hardware-map-container {
    display: flex;
    gap: 12px;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    padding: 15px;
    border-radius: var(--radius);
    margin-top: 15px;
    position: relative;
    min-height: 90px;
  }
  
  .ram-block-unit {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-align: center;
    font-family: var(--font-mono);
    font-size: 11px;
    transition: all 0.3s ease;
    position: relative;
    display: flex;
    overflow: hidden;
  }

  .ram-block-unit.free-unit {
    border-color: rgba(61, 220, 151, 0.4);
    background: rgba(61, 220, 151, 0.03);
    color: var(--ready);
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 12px 5px;
  }

  .ram-block-unit.occupied-unit {
    border-color: rgba(255, 180, 84, 0.4);
    background: transparent;
  }

  /* প্রসেস যে অংশটুকু দখল করেছে */
  .allocated-core-space {
    background: rgba(255, 180, 84, 0.12);
    color: #ffb454;
    padding: 12px 5px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-right: 1px dashed rgba(255, 180, 84, 0.3);
    height: 100%;
    box-sizing: border-box;
  }

  /* ফ্র্যাগমেন্টেশন বা নষ্ট হওয়া মেমোরির টুকরো (ক্রিস্টাল ক্লিয়ার হাইলাইট) */
  .fragmented-waste-space {
    background: repeating-linear-gradient(
      45deg,
      rgba(255, 92, 92, 0.04),
      rgba(255, 92, 92, 0.04) 8px,
      rgba(255, 92, 92, 0.15) 8px,
      rgba(255, 92, 92, 0.15) 16px
    );
    color: var(--fault);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    box-sizing: border-box;
    padding: 12px 5px;
  }
  .frag-title {
    font-weight: bold;
    font-size: 9px;
    letter-spacing: 0.5px;
    color: var(--fault);
    text-shadow: 0 0 4px rgba(255,92,92,0.2);
  }

  /* --- Memory Scanwave Line --- */
  @keyframes scanwave {
    0% { left: 0%; opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.8; }
    100% { left: 100%; opacity: 0; }
  }
  .scanwave-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 6px;
    background: linear-gradient(90deg, transparent, var(--running), transparent);
    box-shadow: 0 0 10px var(--running);
    display: none;
    pointer-events: none;
    z-index: 5;
  }
</style>

<div class="allocator-grid">
  <div class="alloc-panel-block">
    <div class="block-header">Dynamic Memory Request Interface</div>
    
    <div class="ctrl-group" style="flex-direction: column; align-items: flex-start; gap: 12px;">
      <div style="width: 100%;">
        <label style="display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px;">Allocation Strategy:</label>
        <select id="alloc-algo" style="width: 100%; background: var(--surface-2); color: var(--text); border: 1px solid var(--border); padding: 8px; border-radius: var(--radius);">
          <option value="first">First Fit (Sequential Search)</option>
          <option value="best">Best Fit (Optimal Smallest Fragment)</option>
          <option value="worst">Worst Fit (Max Space Chunk Allocation)</option>
        </select>
      </div>

      <div style="display: flex; gap: 15px; width: 100%;">
        <div style="flex: 1;">
          <label style="display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px;">Process Size (KB):</label>
          <input type="number" id="alloc-size" value="45" min="1" style="width: 100%; background: var(--surface-2); color: var(--text); border: 1px solid var(--border); padding: 8px; border-radius: var(--radius);">
        </div>
        <div style="flex: 1;">
          <label style="display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px;">Process ID:</label>
          <input type="text" id="alloc-pid" value="P9" style="width: 100%; text-transform: uppercase; background: var(--surface-2); color: var(--text); border: 1px solid var(--border); padding: 8px; border-radius: var(--radius);">
        </div>
      </div>

      <button class="btn-run" onclick="triggerSmartHeapAllocation()" style="width: 100%; padding: 12px; margin-top: 5px; font-weight: bold;">Request Heap Allocation</button>
      <button onclick="resetRAMStructure()" style="width: 100%; padding: 6px; background: transparent; border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; border-radius: var(--radius);">Reset RAM Structure</button>
    </div>

    <div class="comparison-chart-wrapper">
      <div class="chart-title">Strategy Efficiency Comparison</div>
      <div class="chart-bars">
        <div class="chart-col">
          <div class="bar-container">
            <div id="bar-first-used" class="bar-fill-used" style="height: 0%"></div>
            <div id="bar-first-frag" class="bar-fill-frag" style="height: 0%"></div>
          </div>
          <div class="bar-label">First Fit</div>
        </div>
        <div class="chart-col" style="position: relative;">
          <div id="best-star" class="best-pick-star" style="display: none;">⭐</div>
          <div class="bar-container">
            <div id="bar-best-used" class="bar-fill-used" style="height: 0%"></div>
            <div id="bar-best-frag" class="bar-fill-frag" style="height: 0%"></div>
          </div>
          <div class="bar-label" style="font-weight: bold; color: var(--ready);">Best Fit</div>
        </div>
        <div class="chart-col">
          <div class="bar-container">
            <div id="bar-worst-used" class="bar-fill-used" style="height: 0%"></div>
            <div id="bar-worst-frag" class="bar-fill-frag" style="height: 0%"></div>
          </div>
          <div class="bar-label">Worst Fit</div>
        </div>
      </div>
    </div>
  </div>

  <div class="alloc-panel-block">
    <div class="block-header">Static RAM Partition Registers</div>
    <table class="sched-table" style="width: 100%; border-collapse: collapse;">
      <thead>
        <tr style="text-align: left; border-bottom: 1px solid var(--border);">
          <th style="padding: 8px;">Block Index</th>
          <th style="padding: 8px;">Initial Size</th>
          <th style="padding: 8px;">Current Status</th>
          <th style="padding: 8px;">Leased Space</th>
        </tr>
      </thead>
      <tbody id="ram-table-body">
        </tbody>
    </table>
  </div>
</div>

<div class="alloc-panel-block">
  <div class="block-header">Hardware Memory Map & Real-time Fragmentation</div>
  <div style="font-family: var(--font-mono); font-size: 10px; color: var(--text-dimmer); margin-bottom: 8px;">
    [Lower Memory Boundary 0x00800] ➔➔➔➔➔➔➔➔ [Upper Boundary 0XFFFFF]
  </div>
  
  <div class="hardware-map-container" id="hardware-ram-map">
    <div class="scanwave-line" id="ram-scanwave"></div>
    </div>
</div>

<script>
  // ইনিশিয়াল ডাটা ম্যাপ (আপনার স্ক্রিনশটের ব্লক সাইজ অনুযায়ী হুবহু সেট করা)
  let staticRAMBlocks = [
    { id: 0, size: 30, status: "Available", pid: "-", leased: 0 },
    { id: 1, size: 100, status: "Available", pid: "-", leased: 0 },
    { id: 2, size: 40, status: "Available", pid: "-", leased: 0 },
    { id: 3, size: 200, status: "Available", pid: "-", leased: 0 },
    { id: 4, size: 50, status: "Available", pid: "-", leased: 0 }
  ];

  if(!window.KernelXLog) {
    window.KernelXLog = function(msg, type='info') { console.log(`[${type.toUpperCase()}] ${msg}`); };
  }

  document.addEventListener("DOMContentLoaded", () => {
    renderMemoryArchitecture();
  });

  // ==================== ক্রিস্টাল ক্লিয়ার স্প্লিট রেন্ডারিং ইঞ্জিন ====================
  function renderMemoryArchitecture() {
    // ১. রেজিস্টার টেবিল আপডেট
    const tbody = document.getElementById('ram-table-body');
    tbody.innerHTML = '';
    staticRAMBlocks.forEach(b => {
      let statusColor = b.status === "Available" ? "var(--ready)" : "#ffb454";
      let statusIcon = b.status === "Available" ? "✔ " : "🔒 ";
      tbody.innerHTML += `
        <tr style="border-bottom: 1px solid var(--border);">
          <td style="padding: 8px;">Block [${b.id}]</td>
          <td style="padding: 8px;">${b.size} KB</td>
          <td style="padding: 8px; color: ${statusColor}">${statusIcon}${b.status}</td>
          <td style="padding: 8px;">${b.leased} KB</td>
        </tr>
      `;
    });

    // ২. মেমোরি ম্যাপের গ্রাফিকাল স্প্লিট মেকানিজম
    const mapContainer = document.getElementById('hardware-ram-map');
    const scanwave = document.getElementById('ram-scanwave');
    mapContainer.innerHTML = '';
    mapContainer.appendChild(scanwave);

    staticRAMBlocks.forEach(b => {
      const div = document.createElement('div');
      
      if(b.status === "Available") {
        // ব্লক সম্পূর্ণ ফ্রী থাকলে নরমাল নিয়ন গ্রিন বক্স
        div.className = "ram-block-unit free-unit";
        div.style.flex = b.size; 
        div.innerHTML = `<strong>FREE</strong><br>${b.size} KB<br><span style="color:var(--text-dimmer)">Slot [${b.id}]</span>`;
      } else {
        // ব্লক অকুপাইড হলে এটিকে প্রসেস কোড এবং ওয়েস্ট এরিয়া (লাল হ্যাশ) এই ২ ভাগে ভাগ করা হবে
        div.className = "ram-block-unit occupied-unit";
        div.style.flex = b.size; 
        
        let fragSize = b.size - b.leased; // মেমোরির অপচয় বা ফ্র্যাগমেন্টেশন
        
        let leasedPercent = (b.leased / b.size) * 100;
        let fragPercent = (fragSize / b.size) * 100;

        div.innerHTML = `
          <div class="allocated-core-space" style="width: ${leasedPercent}%" title="Allocated Core Memory">
            <strong style="color:#ffb454">${b.pid}</strong>
            <span style="font-size:10px; margin-top:2px;">${b.leased} KB</span>
          </div>
          ${fragSize > 0 ? `
            <div class="fragmented-waste-space" style="width: ${fragPercent}%" title="Internal Fragmentation Space">
              <span class="frag-title">WASTE AREA</span>
              <span style="font-size:10px; font-weight:bold; margin-top:2px;">-${fragSize} KB</span>
            </div>
          ` : ''}
        `;
      }
      mapContainer.appendChild(div);
    });
  }

  // ==================== অ্যালোকেশন এক্সিকিউশন লুপ ====================
  async function triggerSmartHeapAllocation() {
    const algo = document.getElementById('alloc-algo').value;
    const size = parseInt(document.getElementById('alloc-size').value) || 0;
    const pid = document.getElementById('alloc-pid').value.toUpperCase() || "Px";

    window.KernelXLog(`MMU Request: Allocating block for ${pid} (${size} KB) via [${algo.toUpperCase()} FIT]`, 'info');

    // লেজার স্ক্যানিং এনিমেশন চালু
    const scanwave = document.getElementById('ram-scanwave');
    scanwave.style.display = "block";
    scanwave.style.animation = "none";
    void scanwave.offsetWidth; 
    scanwave.style.animation = "scanwave 0.6s linear forwards";

    await new Promise(r => setTimeout(r, 600)); 
    scanwave.style.display = "none";

    let targetIndex = -1;

    // ফিটিং অ্যালগরিদম লজিক
    if (algo === 'first') {
      for(let i=0; i<staticRAMBlocks.length; i++) {
        if(staticRAMBlocks[i].status === "Available" && staticRAMBlocks[i].size >= size) {
          targetIndex = i;
          break;
        }
      }
    } else if (algo === 'best') {
      let minFrag = Infinity;
      for(let i=0; i<staticRAMBlocks.length; i++) {
        if(staticRAMBlocks[i].status === "Available" && staticRAMBlocks[i].size >= size) {
          let frag = staticRAMBlocks[i].size - size;
          if(frag < minFrag) {
            minFrag = frag;
            targetIndex = i;
          }
        }
      }
    } else if (algo === 'worst') {
      let maxSpace = -1;
      for(let i=0; i<staticRAMBlocks.length; i++) {
        if(staticRAMBlocks[i].status === "Available" && staticRAMBlocks[i].size >= size) {
          if(staticRAMBlocks[i].size > maxSpace) {
            maxSpace = staticRAMBlocks[i].size;
            targetIndex = i;
          }
        }
      }
    }

    if(targetIndex !== -1) {
      staticRAMBlocks[targetIndex].status = `Occupied (${pid})`;
      staticRAMBlocks[targetIndex].pid = pid;
      staticRAMBlocks[targetIndex].leased = size;
      window.KernelXLog(`MMU Success: Mapped ${pid} to System RAM Registers at Block [${targetIndex}].`, 'ok');
      updateEfficiencyGraphs(size);
    } else {
      window.KernelXLog(`MMU Error: Insufficient contiguous space available for ${pid} (${size} KB).`, 'err');
    }

    renderMemoryArchitecture();
  }

  // ৩টি অ্যালগরিদমের অপচয়ের তুলনা ডাইনামিক বারে পুশ করা
  function updateEfficiencyGraphs(reqSize) {
    let firstFrag = 0, bestFrag = 0, worstFrag = 0;
    
    if(100 >= reqSize) firstFrag = 100 - reqSize; // Block 1 (100KB)
    if(50 >= reqSize) bestFrag = 50 - reqSize;   // Block 4 (50KB)
    if(200 >= reqSize) worstFrag = 200 - reqSize; // Block 3 (200KB)

    let maxBlockSize = 200;
    document.getElementById('bar-first-used').style.height = `${(reqSize / maxBlockSize) * 100}%`;
    document.getElementById('bar-first-frag').style.height = `${(firstFrag / maxBlockSize) * 100}%`;

    document.getElementById('bar-best-used').style.height = `${(reqSize / maxBlockSize) * 100}%`;
    document.getElementById('bar-best-frag').style.height = `${(bestFrag / maxBlockSize) * 100}%`;

    document.getElementById('bar-worst-used').style.height = `${(reqSize / maxBlockSize) * 100}%`;
    document.getElementById('bar-worst-frag').style.height = `${(worstFrag / maxBlockSize) * 100}%`;

    document.getElementById('best-star').style.display = "block";
  }

  function resetRAMStructure() {
    staticRAMBlocks = [
      { id: 0, size: 30, status: "Available", pid: "-", leased: 0 },
      { id: 1, size: 100, status: "Available", pid: "-", leased: 0 },
      { id: 2, size: 40, status: "Available", pid: "-", leased: 0 },
      { id: 3, size: 200, status: "Available", pid: "-", leased: 0 },
      { id: 4, size: 50, status: "Available", pid: "-", leased: 0 }
    ];
    
    document.getElementById('bar-first-used').style.height = "0%";
    document.getElementById('bar-first-frag').style.height = "0%";
    document.getElementById('bar-best-used').style.height = "0%";
    document.getElementById('bar-best-frag').style.height = "0%";
    document.getElementById('bar-worst-used').style.height = "0%";
    document.getElementById('bar-worst-frag').style.height = "0%";
    document.getElementById('best-star').style.display = "none";

    window.KernelXLog("Kernel Signal: Flushed and re-indexed static RAM partition map registers.", "warn");
    renderMemoryArchitecture();
  }
</script>
